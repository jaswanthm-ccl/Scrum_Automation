[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py task_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --capture=no
    --html=reports/report.html
    --self-contained-html

# Markers for test categorization
markers =
    smoke: Smoke tests - critical functionality
    sanity: Sanity tests - basic functionality
    regression: Regression tests
    functional: Functional tests
    integration: Integration tests
    ui: UI tests
    slow: Slow running tests
    auth: Authentication related tests
    board: Board/Dashboard related tests
    tasks: Task management tests
    qa: QA task tests
    leave: Leave management tests
    dependencies: Client dependency tests

# Test paths
testpaths = tests

# Log options
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = reports/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
