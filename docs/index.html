<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scrum Automation Reports</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1e2433;
      --muted: #5c6478;
      --accent: #0f766e;
      --accent-hover: #0b5d57;
      --border: #d8deea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 20%, #ecfdf5 0%, var(--bg) 40%, #eef2ff 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(30, 36, 51, 0.08);
      padding: 28px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.5rem, 3.8vw, 2rem);
      line-height: 1.2;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.5;
    }
    a.button {
      display: inline-block;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 600;
      transition: background 0.2s ease;
    }
    a.button:hover {
      background: var(--accent-hover);
    }
    .hint {
      margin-top: 16px;
      font-size: 0.92rem;
    }
    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Scrum Automation Test Reports</h1>
    <p>This site is deployed from the <code>docs</code> folder using GitHub Pages.</p>
    <a class="button" href="./report.html">Open Latest Pytest HTML Report</a>
    <p class="hint">If the report link returns 404, run tests to regenerate <code>docs/report.html</code> and push changes.</p>
  </main>
</body>
</html>
